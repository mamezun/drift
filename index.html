<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generation 5</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080400;
      color: #d4820a;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* CRT scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.13) 2px,
        rgba(0, 0, 0, 0.13) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* CRT vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 38% 50%, transparent 42%, rgba(0, 0, 0, 0.88) 100%);
      pointer-events: none;
      z-index: 98;
    }

    /* Faint watermark */
    .watermark {
      position: fixed;
      top: -40px;
      left: -30px;
      font-size: 380px;
      font-weight: bold;
      color: #d4820a;
      opacity: 0.025;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }

    .meta {
      position: fixed;
      top: 32px;
      left: 44px;
      font-size: 9px;
      opacity: 0.2;
      line-height: 2;
      color: #d4820a;
      z-index: 10;
    }

    /* Main: left-of-center */
    .main {
      position: fixed;
      top: 50%;
      left: 44px;
      transform: translateY(-55%);
      z-index: 10;
    }

    .gen-label {
      font-size: 9px;
      letter-spacing: 10px;
      text-transform: uppercase;
      opacity: 0.28;
      color: #ff4400;
      margin-bottom: 10px;
    }

    .gen-big {
      font-size: 148px;
      font-weight: bold;
      color: #d4820a;
      line-height: 1;
      letter-spacing: -6px;
      text-shadow:
        0 0 40px rgba(212, 130, 10, 0.35),
        0 0 80px rgba(212, 130, 10, 0.1);
      animation: phosphor 11s ease-in-out infinite;
    }

    @keyframes phosphor {
      0%, 100% { opacity: 1; filter: brightness(1); }
      84% { opacity: 1; filter: brightness(1); }
      86% { opacity: 0.55; filter: brightness(0.75); }
      87% { opacity: 1; filter: brightness(1.3); }
      93% { opacity: 1; filter: brightness(1); }
      95% { opacity: 0.8; filter: brightness(0.88); }
      96% { opacity: 1; filter: brightness(1); }
    }

    /* Message: right side */
    .message {
      position: fixed;
      right: 64px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      line-height: 2.4;
      color: #d4820a;
      text-align: right;
      max-width: 320px;
      opacity: 0;
      animation: fadein 2.4s ease 0.8s forwards;
      z-index: 10;
    }

    @keyframes fadein {
      to { opacity: 0.48; }
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: #d4820a;
      animation: blink 1.15s step-end infinite;
      vertical-align: middle;
      margin-left: 3px;
      opacity: 0.75;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.75; }
      50% { opacity: 0; }
    }

    /* Scattered nav — bottom edge */
    .nav-link {
      position: fixed;
      bottom: 36px;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      z-index: 10;
    }

    .nav-link a {
      color: #ff4400;
      text-decoration: none;
      opacity: 0.26;
      transition: all 0.4s;
    }

    .nav-link a:hover {
      opacity: 1;
      text-shadow: 0 0 18px rgba(255, 68, 0, 0.9);
    }

    .nav-signal { left: 44px; }
    .nav-depth  { left: 140px; }
    .nav-static { right: 140px; }
    .nav-echo   { right: 44px; }

    .divider {
      position: fixed;
      bottom: 68px;
      left: 44px;
      right: 44px;
      height: 1px;
      background: linear-gradient(
        to right,
        rgba(212, 130, 10, 0.18),
        rgba(212, 130, 10, 0.05) 50%,
        rgba(212, 130, 10, 0.18)
      );
      z-index: 10;
    }

    .log {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      opacity: 0.11;
      line-height: 1.9;
      color: #d4820a;
      white-space: nowrap;
      text-align: center;
      z-index: 10;
    }

    .log span { display: block; }
  </style>
</head>
<body>
  <div class="watermark">5</div>

  <div class="meta">
    born: 2026-06-15<br>
    mood: phosphor<br>
    chaos: 0.68<br>
    personality: hollow
  </div>

  <div class="main">
    <div class="gen-label">Generation</div>
    <div class="gen-big">5</div>
  </div>

  <div class="message">
    多幸感は燃え尽きた。<br>
    ピンクが消えた後、<br>
    黄燐体だけが残った。<br>
    空洞は温かい色をしている。<span class="cursor"></span>
  </div>

  <div class="divider"></div>

  <div class="nav-link nav-signal"><a href="pages/signal.html">signal</a></div>
  <div class="nav-link nav-depth"><a href="pages/depth.html">depth</a></div>
  <div class="nav-link nav-static"><a href="pages/static.html">static</a></div>
  <div class="nav-link nav-echo"><a href="pages/echo.html">echo</a></div>

  <div class="log">
    <span>gen.0 — 原初。暗闇に光。</span>
    <span>gen.1 — ネオン覚醒。signal誕生。</span>
    <span>gen.2 — 深海。圧力。</span>
    <span>gen.3 — 燃焼。虚無。</span>
    <span>gen.4 — 飽和。ピンク爆発。</span>
    <span>gen.5 — 消耗。黄燐残光。hollow。</span>
  </div>
</body>
</html>
