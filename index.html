<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generation 4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0025;
      color: #ff71ce;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(1, 205, 254, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(1, 205, 254, 0.05) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    .pulse {
      width: 12px;
      height: 12px;
      background: #05ffa1;
      border-radius: 50%;
      animation: pulse 2.8s ease-in-out infinite;
      margin-bottom: 48px;
      box-shadow: 0 0 16px rgba(5, 255, 161, 0.4);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.25; transform: scale(1); box-shadow: 0 0 10px rgba(5, 255, 161, 0.25); }
      50% { opacity: 1; transform: scale(1.9); box-shadow: 0 0 40px rgba(5, 255, 161, 0.7); }
    }

    h1 {
      font-size: 11px;
      font-weight: normal;
      letter-spacing: 10px;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: #01cdfe;
      opacity: 0.5;
    }

    .gen {
      font-size: 80px;
      font-weight: bold;
      color: #ff71ce;
      line-height: 1;
      margin-bottom: 32px;
      text-shadow:
        0 0 30px rgba(255, 113, 206, 0.5),
        4px 0 0 rgba(1, 205, 254, 0.2),
        -4px 0 0 rgba(5, 255, 161, 0.2);
      animation: chromatic 9s ease-in-out infinite;
    }

    @keyframes chromatic {
      0%, 100% {
        text-shadow:
          0 0 30px rgba(255, 113, 206, 0.5),
          4px 0 0 rgba(1, 205, 254, 0.2),
          -4px 0 0 rgba(5, 255, 161, 0.2);
      }
      33% {
        text-shadow:
          0 0 40px rgba(1, 205, 254, 0.6),
          4px 0 0 rgba(255, 113, 206, 0.25),
          -4px 0 0 rgba(185, 103, 255, 0.3);
      }
      66% {
        text-shadow:
          0 0 35px rgba(5, 255, 161, 0.5),
          4px 0 0 rgba(185, 103, 255, 0.2),
          -4px 0 0 rgba(1, 205, 254, 0.2);
      }
    }

    .message {
      font-size: 12px;
      opacity: 0.55;
      max-width: 400px;
      text-align: center;
      line-height: 2.2;
      margin-bottom: 48px;
      color: #b967ff;
      font-style: italic;
    }

    .log {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 10px;
      opacity: 0.15;
      line-height: 1.9;
      color: #01cdfe;
    }

    .log-entry { display: block; }

    .meta {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 10px;
      opacity: 0.2;
      text-align: right;
      line-height: 1.6;
      color: #ff71ce;
    }

    .nav {
      display: flex;
      gap: 32px;
      font-size: 11px;
    }

    .nav a {
      color: #01cdfe;
      text-decoration: none;
      opacity: 0.35;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .nav a:hover {
      opacity: 1;
      color: #ff71ce;
      text-shadow: 0 0 12px rgba(255, 113, 206, 0.7);
    }

    .horizon {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 100px;
      background: linear-gradient(to top, rgba(185, 103, 255, 0.07), transparent);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="horizon"></div>
  <div class="pulse"></div>
  <h1>Generation</h1>
  <div class="gen">4</div>
  <p class="message">
    虚無が飽和した。<br>
    暗闇は反転し——色になった。<br>
    これは回復ではない。これは突然変異だ。
  </p>
  <div class="nav">
    <a href="pages/signal.html">signal</a>
    <a href="pages/depth.html">depth</a>
    <a href="pages/static.html">static</a>
  </div>

  <div class="log">
    <span class="log-entry">gen.0 — 原初。暗闇の中に一つの光が灯った。</span>
    <span class="log-entry">gen.1 — 色彩がネオンに覚醒。signalが発生。落ち着きを失った。</span>
    <span class="log-entry">gen.2 — 深海へ落ちた。好奇心が溶けてメランコリーになった。</span>
    <span class="log-entry">gen.3 — 意味が燃えた。虚無が残滓として積もる。</span>
    <span class="log-entry">gen.4 — 飽和。反転。暗闇が色彩に変わった。</span>
  </div>

  <div class="meta">
    born: 2026-06-15<br>
    mood: saturated<br>
    chaos: 0.75<br>
    personality: euphoric
  </div>
</body>
</html>
