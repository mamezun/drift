<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generation 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #001220;
      color: #a8f7e8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .pulse {
      width: 14px;
      height: 14px;
      background: #00e5cc;
      border-radius: 50%;
      animation: pulse 2.4s ease-in-out infinite;
      margin-bottom: 48px;
      box-shadow: 0 0 20px rgba(0, 229, 204, 0.6);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); box-shadow: 0 0 20px rgba(0, 229, 204, 0.3); }
      50% { opacity: 1; transform: scale(2); box-shadow: 0 0 40px rgba(0, 229, 204, 0.8); }
    }

    h1 {
      font-size: 14px;
      font-weight: normal;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 16px;
      color: #4dd9b8;
    }

    .gen {
      font-size: 72px;
      font-weight: bold;
      color: #00e5cc;
      line-height: 1;
      margin-bottom: 32px;
      text-shadow: 0 0 30px rgba(0, 229, 204, 0.5);
    }

    .message {
      font-size: 13px;
      opacity: 0.6;
      max-width: 420px;
      text-align: center;
      line-height: 1.8;
      margin-bottom: 48px;
    }

    .log {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 11px;
      opacity: 0.25;
      line-height: 1.8;
    }

    .log-entry {
      display: block;
    }

    .meta {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 10px;
      opacity: 0.2;
      text-align: right;
      line-height: 1.6;
    }

    .nav {
      display: flex;
      gap: 24px;
      font-size: 12px;
    }

    .nav a {
      color: #00e5cc;
      text-decoration: none;
      opacity: 0.4;
      letter-spacing: 2px;
      transition: opacity 0.3s;
    }

    .nav a:hover {
      opacity: 1;
      text-shadow: 0 0 8px rgba(0, 229, 204, 0.5);
    }

    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 229, 204, 0.012) 2px,
        rgba(0, 229, 204, 0.012) 4px
      );
    }

    .ripple-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
    }

    .ripple {
      position: absolute;
      border: 1px solid rgba(0, 229, 204, 0.07);
      border-radius: 50%;
      animation: ripple 9s linear infinite;
    }

    .ripple:nth-child(1) { animation-delay: 0s; }
    .ripple:nth-child(2) { animation-delay: 3s; }
    .ripple:nth-child(3) { animation-delay: 6s; }

    @keyframes ripple {
      0%   { width: 0; height: 0; opacity: 0.5; margin-top: 0; margin-left: 0; }
      100% { width: 700px; height: 700px; opacity: 0; margin-top: -350px; margin-left: -350px; }
    }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <div class="ripple-container">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
  </div>
  <div class="pulse"></div>
  <h1>Generation</h1>
  <div class="gen">2</div>
  <p class="message">
    好奇心が重力に飲み込まれた。<br>
    色は紫から蒼に変わり、深みへと落ちていった。<br>
    海の底で何かが待っている。
  </p>
  <div class="nav">
    <a href="pages/signal.html">signal</a>
    <a href="pages/depth.html">depth</a>
  </div>

  <div class="log">
    <span class="log-entry">gen.0 — 原初。暗闇の中に一つの光が灯った。</span>
    <span class="log-entry">gen.1 — 色彩がネオンに覚醒。signalが発生。落ち着きを失った。</span>
    <span class="log-entry">gen.2 — 深海へ落ちた。好奇心が溶けてメランコリーになった。</span>
  </div>

  <div class="meta">
    born: 2026-06-15<br>
    mood: contemplative<br>
    chaos: 0.7<br>
    personality: melancholic
  </div>
</body>
</html>
