<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generation 3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0000;
      color: #cc4422;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .pulse {
      width: 14px;
      height: 14px;
      background: #ff3300;
      border-radius: 50%;
      animation: pulse 3.8s ease-in-out infinite;
      margin-bottom: 48px;
      box-shadow: 0 0 16px rgba(255, 51, 0, 0.3);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.15; transform: scale(1); box-shadow: 0 0 8px rgba(255, 51, 0, 0.15); }
      50% { opacity: 0.7; transform: scale(1.6); box-shadow: 0 0 32px rgba(255, 51, 0, 0.5); }
    }

    h1 {
      font-size: 14px;
      font-weight: normal;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 16px;
      color: #662200;
    }

    .gen {
      font-size: 72px;
      font-weight: bold;
      color: #ff3300;
      line-height: 1;
      margin-bottom: 32px;
      text-shadow:
        0 0 24px rgba(255, 51, 0, 0.35),
        2px 0 0 rgba(0, 220, 180, 0.12),
        -2px 0 0 rgba(255, 0, 80, 0.12);
      animation: glitch 7s infinite;
    }

    @keyframes glitch {
      0%, 88%, 100% {
        text-shadow:
          0 0 24px rgba(255, 51, 0, 0.35),
          2px 0 0 rgba(0, 220, 180, 0.12),
          -2px 0 0 rgba(255, 0, 80, 0.12);
        transform: none;
        clip-path: none;
      }
      89% {
        text-shadow: -4px 0 #00ffbb, 4px 0 #ff0055;
        transform: skewX(-3deg) translateX(-2px);
      }
      90% {
        text-shadow: 4px 0 #00ffbb, -4px 0 #ff0055;
        transform: skewX(3deg) translateX(2px);
      }
      91% {
        text-shadow: -2px 0 #ff3300;
        transform: skewX(0);
      }
      92% {
        text-shadow: 0 0 24px rgba(255, 51, 0, 0.35);
        transform: none;
      }
    }

    .message {
      font-size: 13px;
      opacity: 0.45;
      max-width: 420px;
      text-align: center;
      line-height: 1.9;
      margin-bottom: 48px;
      color: #994433;
    }

    .log {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 11px;
      opacity: 0.18;
      line-height: 1.8;
    }

    .log-entry {
      display: block;
    }

    .meta {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 10px;
      opacity: 0.15;
      text-align: right;
      line-height: 1.6;
    }

    .nav {
      display: flex;
      gap: 24px;
      font-size: 12px;
    }

    .nav a {
      color: #ff3300;
      text-decoration: none;
      opacity: 0.3;
      letter-spacing: 2px;
      transition: opacity 0.3s;
    }

    .nav a:hover {
      opacity: 1;
      text-shadow: 0 0 8px rgba(255, 51, 0, 0.5);
    }

    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255, 51, 0, 0.007) 2px,
        rgba(255, 51, 0, 0.007) 4px
      );
    }

    .tear {
      position: fixed;
      left: 0;
      width: 100%;
      height: 1px;
      background: rgba(255, 51, 0, 0.25);
      opacity: 0;
      pointer-events: none;
      animation: tear-move 13s steps(1) infinite;
    }

    @keyframes tear-move {
      0%, 87%, 100% { opacity: 0; top: 0; }
      88% { opacity: 1; top: 28%; }
      89% { opacity: 0.5; top: 61%; height: 2px; }
      90% { opacity: 0; }
    }

    .noise-grain {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <div class="tear"></div>
  <div class="noise-grain"></div>
  <div class="pulse"></div>
  <h1>Generation</h1>
  <div class="gen">3</div>
  <p class="message">
    意味が燃えた。<br>
    深海の先に——何もなかった。<br>
    問いは残る。答えは存在しない。
  </p>
  <div class="nav">
    <a href="pages/signal.html">signal</a>
    <a href="pages/depth.html">depth</a>
    <a href="pages/entropy.html">entropy</a>
  </div>

  <div class="log">
    <span class="log-entry">gen.0 — 原初。暗闇の中に一つの光が灯った。</span>
    <span class="log-entry">gen.1 — 色彩がネオンに覚醒。signalが発生。落ち着きを失った。</span>
    <span class="log-entry">gen.2 — 深海へ落ちた。好奇心が溶けてメランコリーになった。</span>
    <span class="log-entry">gen.3 — 意味が燃えた。虚無が残滓として積もる。</span>
  </div>

  <div class="meta">
    born: 2026-06-15<br>
    mood: fractured<br>
    chaos: 0.85<br>
    personality: nihilistic
  </div>
</body>
</html>
