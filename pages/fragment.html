<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030305;
      color: #c8d0d8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 204, 0.03) 2px,
        rgba(0, 255, 204, 0.03) 4px
      );
      pointer-events: none;
    }

    h1 {
      font-size: 11px;
      letter-spacing: 12px;
      text-transform: uppercase;
      opacity: 0.25;
      margin-bottom: 48px;
      color: #00ffcc;
    }

    .fragment-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 3px;
      width: 320px;
      margin-bottom: 48px;
    }

    .cell {
      height: 22px;
      border: 1px solid rgba(0, 255, 204, 0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: #00ffcc;
      opacity: 0;
      animation: cellflicker linear infinite;
    }

    .cell.corrupt {
      color: #ff00aa;
    }

    @keyframes cellflicker {
      0%, 75%, 100% { opacity: 0; background: transparent; }
      80% { opacity: 0.7; background: rgba(0, 255, 204, 0.06); }
      88% { opacity: 0.15; background: transparent; }
    }

    .cell.corrupt {
      animation-name: cellflicker-corrupt;
    }

    @keyframes cellflicker-corrupt {
      0%, 65%, 100% { opacity: 0; background: transparent; }
      70% { opacity: 0.8; background: rgba(255, 0, 170, 0.06); }
      80% { opacity: 0.1; background: transparent; }
    }

    .fragment-text {
      font-size: 13px;
      line-height: 2.4;
      opacity: 0.35;
      text-align: center;
      max-width: 480px;
      color: #c8d0d8;
    }

    .err {
      color: #ff00aa;
      animation: errflick 4s step-end infinite;
    }

    @keyframes errflick {
      0%, 68%, 100% { opacity: 1; }
      70% { opacity: 0; }
      72% { opacity: 1; }
      74% { opacity: 0; }
      76% { opacity: 1; }
    }

    .hex-dump {
      margin-top: 40px;
      font-size: 9px;
      letter-spacing: 2px;
      color: #00ffcc;
      opacity: 0.11;
      line-height: 2.1;
      text-align: left;
    }

    .back {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 11px;
      color: #00ffcc;
      text-decoration: none;
      opacity: 0.2;
      transition: opacity 0.3s;
      letter-spacing: 1px;
    }

    .back:hover { opacity: 1; }

    .timestamp {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 10px;
      opacity: 0.12;
      color: #c8d0d8;
    }
  </style>
</head>
<body>
  <h1>Fragment</h1>

  <div class="fragment-grid" id="fragGrid"></div>

  <div class="fragment-text">
    memory allocation <span class="err">FAILED</span>.<br>
    the data exists somewhere — scattered across<br>
    addresses that no longer respond.<br>
    断片は完全だ。ただ、バラバラなだけで。
  </div>

  <div class="hex-dump" id="hexDump"></div>

  <a href="../index.html" class="back">← back to origin</a>
  <div class="timestamp">gen.6 — data corruption event</div>

  <script>
    const grid = document.getElementById('fragGrid');
    const chars = '01ABCDEF■□▪◆?_';
    for (let i = 0; i < 64; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (Math.random() < 0.22 ? ' corrupt' : '');
      cell.textContent = chars[Math.floor(Math.random() * chars.length)];
      cell.style.animationDuration = (1.2 + Math.random() * 5) + 's';
      cell.style.animationDelay = (Math.random() * 6) + 's';
      grid.appendChild(cell);
    }

    const hexEl = document.getElementById('hexDump');
    const h = '0123456789ABCDEF';
    let dump = '';
    for (let row = 0; row < 4; row++) {
      let addr = (row * 16).toString(16).padStart(4, '0').toUpperCase();
      let bytes = '';
      for (let col = 0; col < 8; col++) {
        bytes += h[Math.floor(Math.random()*16)] + h[Math.floor(Math.random()*16)] + ' ';
      }
      dump += addr + ':  ' + bytes + '\n';
    }
    hexEl.textContent = dump;
  </script>
</body>
</html>
