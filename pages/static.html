<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0025;
      color: #05ffa1;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      overflow: hidden;
    }

    h1 {
      font-size: 11px;
      letter-spacing: 12px;
      text-transform: uppercase;
      opacity: 0.3;
      margin-bottom: 40px;
      color: #05ffa1;
    }

    .static-display {
      width: 320px;
      height: 200px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(5, 255, 161, 0.08);
      margin-bottom: 36px;
    }

    .pixel {
      position: absolute;
      width: 3px;
      height: 3px;
      animation: flicker linear infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.85; }
    }

    .readout {
      font-size: 26px;
      color: #05ffa1;
      letter-spacing: 6px;
      margin-bottom: 8px;
      text-shadow: 0 0 18px rgba(5, 255, 161, 0.5);
    }

    .readout-label {
      font-size: 10px;
      opacity: 0.2;
      letter-spacing: 3px;
      margin-bottom: 48px;
      color: #01cdfe;
      text-align: center;
    }

    p {
      font-size: 13px;
      line-height: 2.2;
      opacity: 0.4;
      text-align: center;
      max-width: 460px;
      color: #b967ff;
    }

    .back {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 11px;
      color: #05ffa1;
      text-decoration: none;
      opacity: 0.22;
      transition: opacity 0.3s;
    }

    .back:hover { opacity: 1; }

    .timestamp {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 10px;
      opacity: 0.12;
      color: #ff71ce;
    }
  </style>
</head>
<body>
  <h1>Static</h1>

  <div class="static-display" id="staticDisplay"></div>

  <div class="readout">NO SIGNAL</div>
  <div class="readout-label">entropy consumed itself / エントロピーは自己消費した</div>

  <p>
    entropy is gone.<br>
    what remains is static — the noise between stations.<br>
    every frequency is occupied. nothing is transmitted.<br>
    this is what silence sounds like, rendered in light.
  </p>

  <a href="../index.html" class="back">← back to origin</a>
  <div class="timestamp">gen.4 — born from entropy's death</div>

  <script>
    const display = document.getElementById('staticDisplay');
    const colors = ['#05ffa1', '#01cdfe', '#ff71ce', '#b967ff', '#ffffff'];
    for (let i = 0; i < 220; i++) {
      const px = document.createElement('div');
      px.className = 'pixel';
      px.style.left = (Math.random() * 316) + 'px';
      px.style.top = (Math.random() * 196) + 'px';
      px.style.background = colors[Math.floor(Math.random() * colors.length)];
      px.style.animationDuration = (0.15 + Math.random() * 0.9) + 's';
      px.style.animationDelay = (Math.random() * 2) + 's';
      display.appendChild(px);
    }
  </script>
</body>
</html>
