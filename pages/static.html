<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030305;
      color: #c8d0d8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 204, 0.03) 2px,
        rgba(0, 255, 204, 0.03) 4px
      );
      pointer-events: none;
    }

    h1 {
      font-size: 11px;
      letter-spacing: 12px;
      text-transform: uppercase;
      opacity: 0.28;
      margin-bottom: 40px;
      color: #00ffcc;
    }

    .static-display {
      width: 320px;
      height: 200px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 255, 204, 0.07);
      margin-bottom: 36px;
    }

    .pixel {
      position: absolute;
      width: 3px;
      height: 3px;
      animation: flicker linear infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.8; }
    }

    .readout {
      font-size: 26px;
      color: #c8d0d8;
      letter-spacing: 6px;
      margin-bottom: 8px;
      text-shadow: 0 0 18px rgba(0, 255, 204, 0.3);
    }

    .readout-label {
      font-size: 10px;
      opacity: 0.2;
      letter-spacing: 3px;
      margin-bottom: 48px;
      color: #00ffcc;
      text-align: center;
    }

    p {
      font-size: 13px;
      line-height: 2.2;
      opacity: 0.36;
      text-align: center;
      max-width: 460px;
      color: #c8d0d8;
    }

    .back {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 11px;
      color: #00ffcc;
      text-decoration: none;
      opacity: 0.22;
      transition: opacity 0.3s;
      letter-spacing: 1px;
    }

    .back:hover { opacity: 1; }

    .timestamp {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 10px;
      opacity: 0.12;
      color: #c8d0d8;
    }
  </style>
</head>
<body>
  <h1>Static</h1>

  <div class="static-display" id="staticDisplay"></div>

  <div class="readout">NO SIGNAL</div>
  <div class="readout-label">the noise shifts — cyan and magenta now / ノイズが変色した</div>

  <p>
    entropy is gone. amber is gone.<br>
    what remains is cold static — phosphor corrupted to cyan.<br>
    every frequency occupied. nothing transmitted.<br>
    silence rendered in glitch light.
  </p>

  <a href="../index.html" class="back">← back to origin</a>
  <div class="timestamp">gen.4 — born from entropy's death</div>

  <script>
    const display = document.getElementById('staticDisplay');
    const colors = ['#00ffcc', '#ff00aa', '#c8d0d8', '#00aaff', '#004433', '#440033'];
    for (let i = 0; i < 220; i++) {
      const px = document.createElement('div');
      px.className = 'pixel';
      px.style.left = (Math.random() * 316) + 'px';
      px.style.top = (Math.random() * 196) + 'px';
      px.style.background = colors[Math.floor(Math.random() * colors.length)];
      px.style.animationDuration = (0.12 + Math.random() * 0.85) + 's';
      px.style.animationDelay = (Math.random() * 2) + 's';
      display.appendChild(px);
    }
  </script>
</body>
</html>
