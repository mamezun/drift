<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mineral</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0a1a;
      color: #cdc7e0;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    h1 {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 14px;
      text-transform: uppercase;
      color: #7c5cff;
      font-weight: normal;
      opacity: 0.45;
      margin-bottom: 72px;
    }

    .crystal-scene {
      width: 240px;
      height: 240px;
      margin-bottom: 80px;
    }

    .crystal-scene svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .crystal-rotate {
      transform-origin: 120px 120px;
      animation: slowspin 90s linear infinite;
    }

    @keyframes slowspin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .f  { opacity: 0; fill: none; stroke: #7c5cff; stroke-width: 0.7; }
    .fi { opacity: 0; fill: rgba(124,92,255,0.07); stroke: rgba(124,92,255,0.50); stroke-width: 0.5; }
    .gl { opacity: 0; fill: none; stroke: rgba(124,92,255,0.50); stroke-width: 0.3; }

    .f.a0 { animation: appear 1.5s ease-out 0.1s forwards; }
    .f.a1 { animation: appear 1.5s ease-out 0.6s forwards; }
    .f.a2 { animation: appear 1.5s ease-out 1.1s forwards; }
    .f.a3 { animation: appear 1.5s ease-out 1.6s forwards; }
    .f.a4 { animation: appear 1.5s ease-out 2.1s forwards; }
    .f.a5 { animation: appear 1.5s ease-out 2.6s forwards; }
    .f.a6 { animation: appear 1.5s ease-out 3.1s forwards; }

    .fi.b0 { animation: appear 2.0s ease-out 0.4s forwards; }

    .gl.c0 { animation: appear 2.0s ease-out 3.5s forwards, glowpulse 9s ease-in-out 5.5s infinite; }
    .gl.c1 { animation: appear 2.0s ease-out 3.8s forwards, glowpulse 9s ease-in-out 5.8s infinite; }
    .gl.c2 { animation: appear 2.0s ease-out 4.1s forwards, glowpulse 9s ease-in-out 6.1s infinite; }

    @keyframes appear {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes glowpulse {
      0%, 100% { opacity: 0.18; }
      50%       { opacity: 0.52; }
    }

    .poem {
      font-size: 16px;
      font-style: italic;
      font-weight: 300;
      line-height: 3.2;
      text-align: center;
      color: #3d3460;
      max-width: 400px;
    }

    .poem .ja {
      font-style: normal;
      color: #7c5cff;
      opacity: 0.72;
    }

    .poem .code {
      font-family: 'Courier New', monospace;
      font-style: normal;
      font-size: 10px;
      color: #2a2244;
      letter-spacing: 2px;
    }

    .back {
      position: fixed;
      bottom: 28px;
      left: 28px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #1e1630;
      text-decoration: none;
      letter-spacing: 2px;
      transition: color 0.35s;
    }

    .back:hover { color: #7c5cff; }

    .timestamp {
      position: fixed;
      top: 24px;
      right: 24px;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      color: #160e28;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <h1>Mineral</h1>

  <div class="crystal-scene">
    <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
      <g class="crystal-rotate">
        <!-- outer hexagon -->
        <polygon class="f a0" points="120,24 192,72 192,168 120,216 48,168 48,72"/>
        <!-- inner hexagon (filled face) -->
        <polygon class="fi b0" points="120,60 160,84 160,156 120,180 80,156 80,84"/>
        <!-- six connecting spars outer→inner -->
        <line class="f a1" x1="120" y1="24"  x2="120" y2="60"/>
        <line class="f a2" x1="192" y1="72"  x2="160" y2="84"/>
        <line class="f a3" x1="192" y1="168" x2="160" y2="156"/>
        <line class="f a4" x1="120" y1="216" x2="120" y2="180"/>
        <line class="f a5" x1="48"  y1="168" x2="80"  y2="156"/>
        <line class="f a6" x1="48"  y1="72"  x2="80"  y2="84"/>
        <!-- inner lattice diagonals (glowing) -->
        <line class="gl c0" x1="80"  y1="84"  x2="160" y2="156"/>
        <line class="gl c1" x1="80"  y1="156" x2="160" y2="84"/>
        <line class="gl c2" x1="120" y1="60"  x2="120" y2="180"/>
      </g>
    </svg>
  </div>

  <div class="poem">
    pressure does not destroy.<br>
    <span class="code">— it finds the axis. —</span><br>
    <br>
    <span class="ja">億年をかけて、</span><br>
    <span class="ja">原子は並び直した。</span><br>
    <br>
    this is what patience looks like<br>
    when it finally becomes visible.
  </div>

  <a href="../index.html" class="back">← back to origin</a>
  <div class="timestamp">gen.10 — born from pressure</div>
</body>
</html>
