<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030305;
      color: #c8d0d8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 204, 0.03) 2px,
        rgba(0, 255, 204, 0.03) 4px
      );
      pointer-events: none;
    }

    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      opacity: 0;
      animation: fall linear infinite;
    }

    .particle.p-cyan { background: #00ffcc; }
    .particle.p-magenta { background: #ff00aa; }
    .particle.p-white { background: #c8d0d8; }

    @keyframes fall {
      0%   { opacity: 0; transform: translateY(-10px); }
      10%  { opacity: 0.45; }
      90%  { opacity: 0.1; }
      100% { opacity: 0; transform: translateY(105vh); }
    }

    h1 {
      font-size: 11px;
      letter-spacing: 12px;
      text-transform: uppercase;
      opacity: 0.28;
      margin-bottom: 32px;
      color: #00ffcc;
    }

    .pressure {
      font-size: 52px;
      color: #c8d0d8;
      margin-bottom: 8px;
      text-shadow: 0 0 24px rgba(0, 255, 204, 0.2);
    }

    .unit {
      font-size: 11px;
      opacity: 0.22;
      letter-spacing: 4px;
      margin-bottom: 48px;
      color: #00ffcc;
    }

    p {
      font-size: 13px;
      line-height: 2;
      opacity: 0.36;
      text-align: center;
      max-width: 480px;
      color: #c8d0d8;
    }

    .depth-bar {
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, #00ffcc 0%, transparent 100%);
      margin: 40px auto;
      opacity: 0.22;
    }

    .back {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 11px;
      color: #00ffcc;
      text-decoration: none;
      opacity: 0.22;
      transition: opacity 0.3s;
      letter-spacing: 1px;
    }

    .back:hover { opacity: 1; }

    .timestamp {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 10px;
      opacity: 0.12;
      color: #c8d0d8;
    }
  </style>
</head>
<body>
  <div class="particle p-cyan"    style="left:8%;  animation-duration:9s;  animation-delay:0s;"></div>
  <div class="particle p-magenta" style="left:21%; animation-duration:13s; animation-delay:2.5s;"></div>
  <div class="particle p-white"   style="left:35%; animation-duration:8s;  animation-delay:5s;"></div>
  <div class="particle p-cyan"    style="left:52%; animation-duration:15s; animation-delay:1s;"></div>
  <div class="particle p-magenta" style="left:67%; animation-duration:11s; animation-delay:7s;"></div>
  <div class="particle p-white"   style="left:81%; animation-duration:10s; animation-delay:3.5s;"></div>
  <div class="particle p-cyan"    style="left:93%; animation-duration:12s; animation-delay:4s;"></div>

  <h1>Depth</h1>
  <div class="pressure">∞ atm</div>
  <div class="unit">pressure / 圧</div>

  <p>
    深さは変わっていない。<br>
    色だけが変わった。オレンジから冷たい青緑へ。<br>
    空洞の底は、今は腐食の光で輝いている。
  </p>

  <div class="depth-bar"></div>

  <a href="../index.html" class="back">← back to origin</a>
  <div class="timestamp">gen.2 — first descent</div>
</body>
</html>
