<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rift</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #020810;
      color: #5cbbc4;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .rift-title {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 14px;
      text-transform: uppercase;
      color: #00f5d4;
      opacity: 0.3;
      white-space: nowrap;
      z-index: 2;
    }

    .pressure-readout {
      position: fixed;
      top: 28px;
      right: 24px;
      font-size: 8px;
      letter-spacing: 2px;
      color: #00f5d4;
      opacity: 0.18;
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 48px;
      pointer-events: none;
    }

    .rift-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px;
      font-style: italic;
      font-weight: 300;
      line-height: 3.2;
      text-align: center;
      max-width: 440px;
      color: #144858;
    }

    .rift-text .glow {
      color: #00f5d4;
      font-style: normal;
      text-shadow: 0 0 24px rgba(0,245,212,0.38);
    }

    .rift-text .lost {
      opacity: 0.2;
      text-decoration: line-through;
      font-size: 11px;
      font-style: normal;
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
    }

    .back {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 10px;
      color: #00f5d4;
      text-decoration: none;
      opacity: 0.18;
      transition: opacity 0.3s;
      letter-spacing: 1px;
      z-index: 2;
    }

    .back:hover { opacity: 0.7; }

    .depth-reading {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-size: 9px;
      opacity: 0.12;
      color: #00f5d4;
      letter-spacing: 2px;
      z-index: 2;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="rift-title">Rift</div>
  <div class="pressure-readout">11,034 m · 1,086 bar</div>

  <div class="content">
    <div class="rift-text">
      <span class="lost">signal lost at 4,287 m</span><br>
      <br>
      where the plates pull apart,<br>
      <span class="glow">something comes up from below.</span><br>
      <br>
      熱水が湧く——<br>
      生命は光のない場所でも<br>
      <span class="glow">圧力を糧にして咲く。</span><br>
      <br>
      this is the floor. this is where it begins.
    </div>
  </div>

  <a href="../index.html" class="back">← surface</a>
  <div class="depth-reading">gen.12 — born from rupture</div>

  <script>
    var canvas = document.getElementById('c');
    var ctx = canvas.getContext('2d');
    var W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    var particles = [];
    for (var i = 0; i < 100; i++) {
      particles.push(makeParticle());
    }

    function makeParticle() {
      return {
        x: Math.random() * 2000,
        y: Math.random() * 1200,
        r: Math.random() * 2.2 + 0.4,
        vx: (Math.random() - 0.5) * 0.25,
        vy: -(Math.random() * 0.22 + 0.04),
        phase: Math.random() * Math.PI * 2,
        freq: 0.2 + Math.random() * 0.3,
        hue: 160 + Math.random() * 35,
        life: Math.random(),
        maxLife: 0.5 + Math.random() * 0.5
      };
    }

    var vents = [
      { xf: 0.28, str: 0.65, drift: 1.1 },
      { xf: 0.50, str: 1.0,  drift: 0.8 },
      { xf: 0.74, str: 0.55, drift: 1.3 }
    ];

    var t = 0;

    function drawBackground() {
      var g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0,   '#010508');
      g.addColorStop(0.6, '#020810');
      g.addColorStop(1,   '#010508');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    function drawVents() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      vents.forEach(function(v) {
        var cx = v.xf * W;
        var wobble = Math.sin(t * v.drift * 0.4) * 12 * v.str;
        var g = ctx.createLinearGradient(cx, H, cx + wobble, H - H * 0.75);
        g.addColorStop(0,   'rgba(0,245,212,' + (0.055 * v.str) + ')');
        g.addColorStop(0.4, 'rgba(0,200,180,' + (0.025 * v.str) + ')');
        g.addColorStop(1,   'rgba(0,120,140,0)');
        ctx.beginPath();
        ctx.moveTo(cx, H);
        ctx.quadraticCurveTo(
          cx + wobble,
          H - H * 0.4,
          cx + wobble * 0.4,
          H - H * 0.75
        );
        ctx.lineWidth = 52 * v.str;
        ctx.strokeStyle = g;
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawRiftCrack() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      var cx = W * 0.5;
      var pulse = 0.04 + Math.sin(t * 0.7) * 0.02;
      var g = ctx.createLinearGradient(cx - 6, 0, cx + 6, 0);
      g.addColorStop(0,   'rgba(0,245,212,0)');
      g.addColorStop(0.5, 'rgba(0,245,212,' + pulse + ')');
      g.addColorStop(1,   'rgba(0,245,212,0)');
      ctx.fillStyle = g;
      ctx.fillRect(cx - 6, 0, 12, H);

      var gl = ctx.createLinearGradient(0, 0, 0, H);
      gl.addColorStop(0,   'rgba(0,245,212,0)');
      gl.addColorStop(0.45, 'rgba(0,245,212,' + (pulse * 0.6) + ')');
      gl.addColorStop(0.55, 'rgba(0,245,212,' + (pulse * 0.6) + ')');
      gl.addColorStop(1,   'rgba(0,245,212,0)');
      ctx.fillStyle = gl;
      ctx.fillRect(cx - 1, 0, 2, H);
      ctx.restore();
    }

    function drawParticles() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      particles.forEach(function(p) {
        p.x += p.vx + Math.sin(t * p.freq + p.phase) * 0.18;
        p.y += p.vy;
        p.life += 0.0025;

        if (p.y < -20 || p.life > p.maxLife) {
          var np = makeParticle();
          np.x = Math.random() * W;
          np.y = H + 10;
          np.life = 0;
          Object.assign(p, np);
          return;
        }

        var a = Math.sin(p.life / p.maxLife * Math.PI) * 0.75;
        var grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
        grd.addColorStop(0, 'hsla(' + p.hue + ',100%,78%,' + a + ')');
        grd.addColorStop(1, 'hsla(' + p.hue + ',100%,55%,0)');
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
      });
      ctx.restore();
    }

    function tick() {
      t += 0.016;
      drawBackground();
      drawVents();
      drawRiftCrack();
      drawParticles();
      requestAnimationFrame(tick);
    }

    tick();
  </script>
</body>
</html>
