<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f0;
      color: #1a1a1a;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .kanji {
      font-size: 180px;
      font-weight: 300;
      color: #1a1a1a;
      animation: breathe 9s ease-in-out infinite;
      line-height: 1;
      margin-bottom: 72px;
      user-select: none;
      opacity: 0.08;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.08; transform: scale(1); }
      50%       { opacity: 0.22; transform: scale(1.015); }
    }

    .poem {
      font-size: 15px;
      font-style: italic;
      font-weight: 300;
      line-height: 3;
      text-align: center;
      color: #888888;
      max-width: 380px;
    }

    .poem .ja {
      font-style: normal;
      color: #aaaaaa;
    }

    .rule-thin {
      width: 1px;
      height: 44px;
      background: #8899aa;
      margin: 56px auto;
      opacity: 0.3;
    }

    .back {
      position: fixed;
      bottom: 28px;
      left: 28px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #bbbbbb;
      text-decoration: none;
      letter-spacing: 2px;
      transition: color 0.3s;
    }

    .back:hover { color: #1a1a1a; }

    .timestamp {
      position: fixed;
      top: 24px;
      right: 24px;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      color: #cccccc;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="kanji">無</div>

  <div class="poem">
    emptiness is not absence.<br>
    it is the space that holds.<br>
    <br>
    <span class="ja">空は器だ。</span><br>
    <span class="ja">何も入っていないとき、</span><br>
    <span class="ja">最も完全だ。</span>
  </div>

  <div class="rule-thin"></div>

  <a href="../index.html" class="back">← back to origin</a>
  <div class="timestamp">gen.8 — born from stillness</div>
</body>
</html>
