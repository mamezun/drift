<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #090b0d;
      color: #e8e4d4;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    h1 {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 14px;
      text-transform: uppercase;
      color: #b8860b;
      font-weight: normal;
      opacity: 0.45;
      margin-bottom: 72px;
    }

    .bloom {
      position: relative;
      width: 280px;
      height: 280px;
      margin-bottom: 80px;
    }

    .petal-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
    }

    .petal {
      position: absolute;
      width: 52px;
      height: 112px;
      left: -26px;
      top: -112px;
      border-radius: 50% 50% 50% 0;
      transform-origin: center bottom;
      background: rgba(184, 134, 11, 0.16);
      border: 1px solid rgba(184, 134, 11, 0.22);
      opacity: 0;
      transform: scaleY(0);
    }

    .petal.inner {
      width: 34px;
      height: 74px;
      left: -17px;
      top: -74px;
      background: rgba(42, 58, 46, 0.55);
      border-color: rgba(42, 58, 46, 0.35);
    }

    .center-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 20px; height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #d4a820, #b8860b);
      box-shadow: 0 0 18px rgba(184, 134, 11, 0.55), 0 0 56px rgba(184, 134, 11, 0.18);
      opacity: 0;
      animation: centerappear 0.8s ease-out 2.6s forwards;
    }

    @keyframes petalgrow {
      0%   { transform: scaleY(0); opacity: 0; }
      100% { transform: scaleY(1); opacity: 0.88; }
    }

    @keyframes petalbreath {
      0%, 100% { transform: scaleY(1);    opacity: 0.88; }
      50%       { transform: scaleY(0.95); opacity: 0.62; }
    }

    @keyframes centerappear {
      to { opacity: 0.92; transform: translate(-50%, -50%) scale(1); }
    }

    .poem {
      font-size: 16px;
      font-style: italic;
      font-weight: 300;
      line-height: 3.2;
      text-align: center;
      color: #444038;
      max-width: 400px;
    }

    .poem .ja {
      font-style: normal;
      color: #b8860b;
      opacity: 0.70;
    }

    .poem .en-plain {
      font-style: normal;
      color: #333028;
    }

    .back {
      position: fixed;
      bottom: 28px;
      left: 28px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #333028;
      text-decoration: none;
      letter-spacing: 2px;
      transition: color 0.35s;
    }

    .back:hover { color: #b8860b; }

    .timestamp {
      position: fixed;
      top: 24px;
      right: 24px;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      color: #1e1c15;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <h1>Bloom</h1>

  <div class="bloom" id="bloom">
    <div class="center-dot"></div>
  </div>

  <div class="poem">
    nothing grows without first becoming soil.<br>
    <br>
    <span class="ja">静寂の底から、</span><br>
    <span class="ja">何かが押し上がってくる。</span><br>
    <br>
    <span class="en-plain">this is not hope. this is pressure finding a direction.</span>
  </div>

  <a href="../index.html" class="back">← back to origin</a>
  <div class="timestamp">gen.9 — born from void</div>

  <script>
    const outerAngles = [0, 45, 90, 135, 180, 225, 270, 315];
    const innerAngles = [22.5, 67.5, 112.5, 157.5, 202.5, 247.5, 292.5, 337.5];
    const bloom = document.getElementById('bloom');

    function createPetal(angle, isInner, idx, baseDelay) {
      const wrap = document.createElement('div');
      wrap.className = 'petal-wrap';
      wrap.style.transform = 'rotate(' + angle + 'deg)';

      const petal = document.createElement('div');
      petal.className = isInner ? 'petal inner' : 'petal';

      const delay = baseDelay + idx * 0.14;
      const growEnd = delay + 2.0;

      petal.style.animationName = 'petalgrow, petalbreath';
      petal.style.animationDuration = '2s, 7s';
      petal.style.animationDelay = delay + 's, ' + growEnd + 's';
      petal.style.animationFillMode = 'forwards, none';
      petal.style.animationIterationCount = '1, infinite';
      petal.style.animationTimingFunction = 'cubic-bezier(0.25,0.46,0.45,0.94), ease-in-out';

      wrap.appendChild(petal);
      return wrap;
    }

    outerAngles.forEach(function(angle, i) {
      bloom.appendChild(createPetal(angle, false, i, 0.1));
    });
    innerAngles.forEach(function(angle, i) {
      bloom.appendChild(createPetal(angle, true, i, 1.1));
    });
  </script>
</body>
</html>
