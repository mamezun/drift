<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threshold</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050914;
      color: #cce0eb;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 48px;
      overflow: hidden;
      transition: background 1.2s ease;
    }

    body.crossed {
      background: #020710;
    }

    .threshold-title {
      position: relative;
      z-index: 1;
      font-size: 9px;
      letter-spacing: 14px;
      text-transform: uppercase;
      color: #4d8fab;
      opacity: 0.35;
      margin-bottom: 80px;
    }

    .door-wrap {
      position: relative;
      z-index: 1;
      margin-bottom: 80px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .door-frame {
      width: 96px;
      height: 152px;
      border: 1px solid rgba(77,143,171,0.25);
      position: relative;
      transition: border-color 0.8s;
    }

    .door-frame::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      box-shadow: inset 0 0 30px rgba(77,143,171,0.0);
      transition: box-shadow 0.8s;
    }

    .door-wrap:hover .door-frame {
      border-color: rgba(77,143,171,0.55);
    }

    .door-wrap:hover .door-frame::after {
      box-shadow: inset 0 0 30px rgba(77,143,171,0.08);
    }

    .door-knob {
      position: absolute;
      right: 14px;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #4d8fab;
      transform: translateY(-50%);
      opacity: 0.35;
      animation: breathe 4s ease-in-out infinite;
      transition: opacity 0.8s;
    }

    .door-wrap:hover .door-knob {
      opacity: 0.7;
    }

    body.crossed .door-knob {
      opacity: 0.1;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 4px rgba(77,143,171,0.2); }
      50%       { box-shadow: 0 0 18px rgba(77,143,171,0.7); }
    }

    .door-interior {
      position: absolute;
      inset: 0;
      background: #020710;
      opacity: 0;
      transition: opacity 1.2s;
    }

    body.crossed .door-interior {
      opacity: 1;
    }

    .door-line {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1px;
      height: 60%;
      background: rgba(77,143,171,0.15);
      transform: translate(-50%, -50%);
      transform-origin: top center;
      transition: transform 1.4s ease, opacity 1.4s;
    }

    body.crossed .door-line {
      transform: translate(-50%, -50%) scaleX(60) scaleY(0.3);
      opacity: 0;
    }

    .threshold-text {
      position: relative;
      z-index: 1;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 15px;
      font-style: italic;
      font-weight: 300;
      line-height: 3.2;
      text-align: center;
      max-width: 380px;
      color: #112032;
    }

    .threshold-text .lit {
      color: #cce0eb;
      font-style: normal;
    }

    .threshold-text .dim {
      color: #4d8fab;
      font-style: normal;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      letter-spacing: 4px;
      opacity: 0.5;
    }

    .back {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 10px;
      color: #cce0eb;
      text-decoration: none;
      opacity: 0.18;
      transition: opacity 0.3s;
      letter-spacing: 1px;
      z-index: 2;
    }

    .back:hover { opacity: 0.75; }

    .stamp {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-size: 9px;
      opacity: 0.1;
      color: #4d8fab;
      letter-spacing: 2px;
      z-index: 2;
    }

    .side-label {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 8px;
      letter-spacing: 3px;
      color: #4d8fab;
      opacity: 0.22;
      z-index: 2;
      transition: opacity 0.6s;
    }

    .particle {
      position: fixed;
      border-radius: 50%;
      background: rgba(77,143,171,0.35);
      pointer-events: none;
      z-index: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(110vh); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      to   { transform: translateY(-60px); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="threshold-title">Threshold</div>

  <div class="door-wrap" id="doorWrap" title="cross">
    <div class="door-frame">
      <div class="door-interior"></div>
      <div class="door-line"></div>
      <div class="door-knob"></div>
    </div>
  </div>

  <div class="threshold-text">
    <span class="dim" id="stateLabel">THIS SIDE</span><br>
    <br>
    境界線の前に立つ。<br>
    <span class="lit">前後の区別はない。</span><br>
    <br>
    the threshold is not a door.<br>
    <span class="lit">it is the act of crossing.</span>
  </div>

  <a href="../index.html" class="back">← surface</a>
  <div class="side-label" id="sideLabel">LIMINAL</div>
  <div class="stamp">gen.15 — born from aftermath</div>

  <script>
    for (var i = 0; i < 14; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var sz = 1 + Math.random() * 2;
      p.style.width = sz + 'px';
      p.style.height = sz + 'px';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (9 + Math.random() * 14) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      document.body.appendChild(p);
    }

    var crossed = false;
    var doorWrap = document.getElementById('doorWrap');
    var stateLabel = document.getElementById('stateLabel');
    var sideLabel = document.getElementById('sideLabel');

    doorWrap.addEventListener('click', function() {
      crossed = !crossed;
      if (crossed) {
        document.body.classList.add('crossed');
        stateLabel.textContent = 'OTHER SIDE';
        sideLabel.textContent = 'CROSSED';
        sideLabel.style.opacity = '0.08';
      } else {
        document.body.classList.remove('crossed');
        stateLabel.textContent = 'THIS SIDE';
        sideLabel.textContent = 'LIMINAL';
        sideLabel.style.opacity = '0.22';
      }
    });
  </script>
</body>
</html>
