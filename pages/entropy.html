<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entropy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0000;
      color: #cc4422;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      overflow: hidden;
    }

    h1 {
      font-size: 11px;
      letter-spacing: 12px;
      text-transform: uppercase;
      opacity: 0.3;
      margin-bottom: 40px;
      color: #662200;
    }

    .formula {
      font-size: 52px;
      color: #ff3300;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 51, 0, 0.25);
      font-style: italic;
      letter-spacing: 4px;
    }

    .formula-label {
      font-size: 10px;
      opacity: 0.2;
      letter-spacing: 4px;
      margin-bottom: 52px;
      text-align: center;
    }

    .meter-wrap {
      width: 300px;
      margin-bottom: 6px;
    }

    .meter {
      width: 100%;
      height: 1px;
      background: #1a0000;
      position: relative;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      background: linear-gradient(to right, #330800, #ff3300);
      animation: entropy-rise 30s linear forwards;
    }

    @keyframes entropy-rise {
      0%   { width: 38%; }
      100% { width: 100%; }
    }

    .meter-label {
      font-size: 10px;
      opacity: 0.18;
      letter-spacing: 2px;
      margin-bottom: 52px;
      display: flex;
      justify-content: space-between;
      width: 300px;
    }

    p {
      font-size: 13px;
      line-height: 2.2;
      opacity: 0.4;
      text-align: center;
      max-width: 480px;
      color: #994433;
    }

    .dissipate {
      margin-top: 48px;
      display: flex;
      gap: 4px;
      align-items: flex-end;
    }

    .bar {
      width: 3px;
      background: #ff3300;
      opacity: 0.3;
      animation: bar-noise linear infinite;
    }

    @keyframes bar-noise {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.4; }
    }

    .back {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 11px;
      color: #ff3300;
      text-decoration: none;
      opacity: 0.22;
      transition: opacity 0.3s;
    }

    .back:hover { opacity: 0.8; }

    .timestamp {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 10px;
      opacity: 0.12;
    }

    .noise-px {
      position: fixed;
      width: 2px;
      height: 2px;
      background: #ff3300;
      opacity: 0;
      animation: noise-flicker linear infinite;
    }

    @keyframes noise-flicker {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.25; }
    }

    .scanline {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(255, 51, 0, 0.006) 2px,
        rgba(255, 51, 0, 0.006) 4px
      );
    }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <div class="noise-px" style="top:12%; left:29%; animation-duration:0.6s; animation-delay:0.1s;"></div>
  <div class="noise-px" style="top:38%; left:74%; animation-duration:1.0s; animation-delay:0.4s;"></div>
  <div class="noise-px" style="top:65%; left:17%; animation-duration:0.8s; animation-delay:0.2s;"></div>
  <div class="noise-px" style="top:82%; left:58%; animation-duration:0.7s; animation-delay:0.6s;"></div>
  <div class="noise-px" style="top:51%; left:91%; animation-duration:1.2s; animation-delay:0.9s;"></div>

  <h1>Entropy</h1>
  <div class="formula">ΔS ≥ 0</div>
  <div class="formula-label">エントロピーは減らない / entropy never decreases</div>

  <div class="meter-wrap">
    <div class="meter">
      <div class="meter-fill"></div>
    </div>
  </div>
  <div class="meter-label">
    <span>order</span>
    <span>disorder →</span>
  </div>

  <p>
    宇宙は常に拡散する。<br>
    秩序は借り物だ。<br>
    どんな構造も、やがて確率の霧に溶ける。<br>
    このサイトも例外ではない。
  </p>

  <div class="dissipate">
    <div class="bar" style="height:28px; animation-duration:0.4s; animation-delay:0.0s;"></div>
    <div class="bar" style="height:41px; animation-duration:0.6s; animation-delay:0.1s;"></div>
    <div class="bar" style="height:19px; animation-duration:0.3s; animation-delay:0.2s;"></div>
    <div class="bar" style="height:55px; animation-duration:0.7s; animation-delay:0.0s;"></div>
    <div class="bar" style="height:33px; animation-duration:0.5s; animation-delay:0.3s;"></div>
    <div class="bar" style="height:48px; animation-duration:0.4s; animation-delay:0.1s;"></div>
    <div class="bar" style="height:22px; animation-duration:0.6s; animation-delay:0.4s;"></div>
    <div class="bar" style="height:37px; animation-duration:0.8s; animation-delay:0.2s;"></div>
    <div class="bar" style="height:14px; animation-duration:0.3s; animation-delay:0.5s;"></div>
    <div class="bar" style="height:60px; animation-duration:0.5s; animation-delay:0.0s;"></div>
    <div class="bar" style="height:26px; animation-duration:0.7s; animation-delay:0.6s;"></div>
    <div class="bar" style="height:44px; animation-duration:0.4s; animation-delay:0.3s;"></div>
  </div>

  <a href="../index.html" class="back">← back to origin</a>
  <div class="timestamp">gen.3 — disorder confirmed</div>
</body>
</html>
