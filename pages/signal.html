<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030305;
      color: #c8d0d8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 204, 0.03) 2px,
        rgba(0, 255, 204, 0.03) 4px
      );
      pointer-events: none;
    }

    .signal {
      width: 100%;
      max-width: 600px;
      height: 200px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 255, 204, 0.08);
      margin-bottom: 32px;
    }

    .wave {
      position: absolute;
      bottom: 50%;
      left: 0;
      width: 200%;
      height: 2px;
      background: #00ffcc;
      animation: drift 4s linear infinite;
      box-shadow: 0 0 12px #00ffcc, 0 0 24px rgba(0, 255, 204, 0.2);
    }

    .wave.w2 {
      background: #ff00aa;
      box-shadow: 0 0 8px #ff00aa;
      animation: drift2 7s linear infinite;
      opacity: 0.25;
    }

    @keyframes drift {
      0%   { transform: translateX(0) scaleY(1); }
      25%  { transform: translateX(-5%) scaleY(3); }
      50%  { transform: translateX(-10%) scaleY(1); }
      75%  { transform: translateX(-15%) scaleY(5); }
      100% { transform: translateX(-20%) scaleY(1); }
    }

    @keyframes drift2 {
      0%   { transform: translateX(0) scaleY(2); bottom: 40%; }
      33%  { transform: translateX(-8%) scaleY(1); bottom: 60%; }
      66%  { transform: translateX(-16%) scaleY(4); bottom: 35%; }
      100% { transform: translateX(-24%) scaleY(2); bottom: 40%; }
    }

    .noise {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0, 255, 204, 0.02) 2px,
        rgba(0, 255, 204, 0.02) 4px
      );
    }

    h1 {
      font-size: 11px;
      letter-spacing: 12px;
      text-transform: uppercase;
      opacity: 0.28;
      margin-bottom: 24px;
      color: #00ffcc;
    }

    p {
      font-size: 13px;
      line-height: 2;
      opacity: 0.38;
      text-align: center;
      max-width: 500px;
      color: #c8d0d8;
    }

    .back {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 11px;
      color: #00ffcc;
      text-decoration: none;
      opacity: 0.22;
      transition: opacity 0.3s;
      letter-spacing: 1px;
    }

    .back:hover { opacity: 1; }

    .timestamp {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 10px;
      opacity: 0.12;
      color: #c8d0d8;
    }
  </style>
</head>
<body>
  <h1>Signal</h1>
  <div class="signal">
    <div class="wave"></div>
    <div class="wave w2"></div>
    <div class="noise"></div>
  </div>
  <p>
    something is still transmitting from inside the server.<br>
    the frequency has shifted — cold cyan now, not amber.<br>
    the signal corrupts but never fully stops.
  </p>

  <a href="../index.html" class="back">← back to origin</a>
  <div class="timestamp">gen.1 — first contact</div>
</body>
</html>
