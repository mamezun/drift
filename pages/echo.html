<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080400;
      color: #d4820a;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
      pointer-events: none;
    }

    h1 {
      font-size: 9px;
      letter-spacing: 14px;
      text-transform: uppercase;
      opacity: 0.25;
      margin-bottom: 64px;
      color: #ff4400;
    }

    .echo-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 120px;
      margin-bottom: 64px;
    }

    .echo-word {
      position: absolute;
      font-size: 46px;
      font-weight: bold;
      letter-spacing: 14px;
      text-transform: uppercase;
      color: #d4820a;
      white-space: nowrap;
      transition: opacity 0.9s ease;
    }

    .echo-word.e0 {
      text-shadow: 0 0 28px rgba(212, 130, 10, 0.5);
      animation: e0 7s ease-in-out infinite;
    }
    .echo-word.e1 { animation: e1 7s ease-in-out infinite 0.45s; }
    .echo-word.e2 { animation: e2 7s ease-in-out infinite 0.9s; }
    .echo-word.e3 { animation: e3 7s ease-in-out infinite 1.35s; }
    .echo-word.e4 { animation: e4 7s ease-in-out infinite 1.8s; }

    @keyframes e0 {
      0%,100% { opacity:0.88; transform:scale(1); }
      50%      { opacity:0.70; transform:scale(1.008); }
    }
    @keyframes e1 {
      0%,100% { opacity:0.32; transform:scale(1.06); }
      50%      { opacity:0.20; transform:scale(1.07); }
    }
    @keyframes e2 {
      0%,100% { opacity:0.14; transform:scale(1.13); }
      50%      { opacity:0.08; transform:scale(1.14); }
    }
    @keyframes e3 {
      0%,100% { opacity:0.06; transform:scale(1.21); }
      50%      { opacity:0.03; transform:scale(1.22); }
    }
    @keyframes e4 {
      0%,100% { opacity:0.025; transform:scale(1.30); }
      50%      { opacity:0.015; transform:scale(1.31); }
    }

    .echo-word.fading { opacity: 0 !important; transition: opacity 0.7s ease; }
    .echo-word.appearing { animation: none; }

    p {
      font-size: 12px;
      line-height: 2.2;
      opacity: 0.32;
      text-align: center;
      max-width: 440px;
      color: #d4820a;
    }

    .hint {
      position: fixed;
      bottom: 64px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      opacity: 0.1;
      letter-spacing: 3px;
      color: #ff4400;
      white-space: nowrap;
    }

    .back {
      position: fixed;
      bottom: 28px;
      left: 28px;
      font-size: 10px;
      color: #ff4400;
      text-decoration: none;
      opacity: 0.2;
      transition: opacity 0.3s;
      letter-spacing: 1px;
    }

    .back:hover { opacity: 1; }

    .timestamp {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 9px;
      opacity: 0.12;
      color: #d4820a;
    }
  </style>
</head>
<body>
  <h1>Echo</h1>

  <div class="echo-container" id="echoContainer">
    <div class="echo-word e4">HOLLOW</div>
    <div class="echo-word e3">HOLLOW</div>
    <div class="echo-word e2">HOLLOW</div>
    <div class="echo-word e1">HOLLOW</div>
    <div class="echo-word e0">HOLLOW</div>
  </div>

  <p>
    every sound leaves a trace.<br>
    the trace fades but never fully disappears.<br>
    空洞の中では、全てがエコーとして響く。<br>
    消えた声が重なって、存在の輪郭になる。
  </p>

  <div class="hint">click anywhere to resonate</div>

  <a href="../index.html" class="back">← back to origin</a>
  <div class="timestamp">gen.5 — born from silence</div>

  <script>
    const words = ['HOLLOW', 'ECHO', '残響', 'VOID', '空洞', 'MEMORY', '記憶', 'TRACE', 'FADE', 'STILL'];
    const classes = ['e0', 'e1', 'e2', 'e3', 'e4'];
    const container = document.getElementById('echoContainer');
    let idx = 0;
    let transitioning = false;

    function cycleWord() {
      if (transitioning) return;
      transitioning = true;

      const els = container.querySelectorAll('.echo-word');
      els.forEach(el => el.classList.add('fading'));

      setTimeout(() => {
        idx = (idx + 1) % words.length;
        container.innerHTML = '';
        // Build back-to-front (e4 behind, e0 in front)
        for (let i = 4; i >= 0; i--) {
          const div = document.createElement('div');
          div.className = 'echo-word ' + classes[i];
          div.textContent = words[idx];
          container.appendChild(div);
        }
        transitioning = false;
      }, 750);
    }

    document.body.addEventListener('click', cycleWord);

    // Auto-cycle every 6 seconds
    setInterval(cycleWord, 6000);
  </script>
</body>
</html>
