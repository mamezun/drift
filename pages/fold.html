<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fold</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030301;
      color: #b8ff00;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 48px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(184,255,0,0.006) 2px,
        rgba(184,255,0,0.006) 3px
      );
      pointer-events: none;
      z-index: 0;
    }

    .fold-title {
      position: relative;
      z-index: 1;
      font-size: 9px;
      letter-spacing: 14px;
      text-transform: uppercase;
      color: #ff5500;
      opacity: 0.35;
      margin-bottom: 56px;
    }

    canvas {
      position: relative;
      z-index: 1;
      display: block;
      margin-bottom: 72px;
    }

    .fold-text {
      position: relative;
      z-index: 1;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 16px;
      font-style: italic;
      font-weight: 300;
      line-height: 3.2;
      text-align: center;
      max-width: 420px;
      color: #2a2600;
    }

    .fold-text .lit {
      color: #b8ff00;
      font-style: normal;
      text-shadow: 0 0 18px rgba(184,255,0,0.28);
    }

    .fold-text .warn {
      color: #ff5500;
      font-style: normal;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
    }

    .back {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 10px;
      color: #b8ff00;
      text-decoration: none;
      opacity: 0.18;
      transition: opacity 0.3s;
      letter-spacing: 1px;
      z-index: 2;
    }

    .back:hover { opacity: 0.75; }

    .stamp {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-size: 9px;
      opacity: 0.1;
      color: #ff5500;
      letter-spacing: 2px;
      z-index: 2;
    }

    .iter-readout {
      position: fixed;
      top: 24px;
      right: 24px;
      font-size: 8px;
      letter-spacing: 3px;
      color: #ff5500;
      opacity: 0.2;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="fold-title">Fold</div>

  <canvas id="c" width="200" height="200"></canvas>

  <div class="fold-text">
    <span class="warn" id="iterLabel">ITERATION: 0</span><br>
    <br>
    the signal came back.<br>
    <span class="lit">it was always its own echo.</span><br>
    <br>
    送信者は受信者だった——<br>
    <span class="lit">常に、そうだった。</span>
  </div>

  <a href="../index.html" class="back">← surface</a>
  <div class="iter-readout">LOOP ∞</div>
  <div class="stamp">gen.14 — born from recursion</div>

  <script>
    var canvas = document.getElementById('c');
    var ctx = canvas.getContext('2d');
    var W = 200, H = 200;
    var cx = W / 2, cy = H / 2;
    var R = 72;
    var t = 0;
    var iter = 0;
    var trailFrac = 0.88;
    var trailLen = Math.PI * 2 * trailFrac;
    var speed = 0.010;

    function draw() {
      ctx.clearRect(0, 0, W, H);

      ctx.fillStyle = '#030301';
      ctx.fillRect(0, 0, W, H);

      // Faint inner ring
      ctx.save();
      ctx.strokeStyle = 'rgba(255,85,0,0.07)';
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.arc(cx, cy, R * 0.46, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      // Faint outer ring
      ctx.save();
      ctx.strokeStyle = 'rgba(184,255,0,0.04)';
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.arc(cx, cy, R * 1.22, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      // Trail — gradient segments fading toward tail
      var segs = 180;
      for (var i = 0; i < segs; i++) {
        var frac = i / segs;
        var a1 = t - trailLen * (1 - frac);
        var a2 = t - trailLen * (1 - (i + 1) / segs);

        var x1 = cx + R * Math.cos(a1);
        var y1 = cy + R * Math.sin(a1);
        var x2 = cx + R * Math.cos(a2);
        var y2 = cy + R * Math.sin(a2);

        ctx.save();
        ctx.strokeStyle = 'rgba(184,255,0,' + (frac * 0.85) + ')';
        ctx.lineWidth = 1.4 + frac * 0.8;
        ctx.shadowBlur = frac * 12;
        ctx.shadowColor = 'rgba(184,255,0,' + (frac * 0.38) + ')';
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.restore();
      }

      // Orange dot at head — chasing its own tail
      var headX = cx + R * Math.cos(t);
      var headY = cy + R * Math.sin(t);
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = 'rgba(255,85,0,0.9)';
      ctx.fillStyle = '#ff5500';
      ctx.beginPath();
      ctx.arc(headX, headY, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Dim dot at tail — what the head is chasing
      var tailAngle = t - trailLen;
      var tailX = cx + R * Math.cos(tailAngle);
      var tailY = cy + R * Math.sin(tailAngle);
      ctx.save();
      ctx.globalAlpha = 0.20;
      ctx.fillStyle = '#b8ff00';
      ctx.beginPath();
      ctx.arc(tailX, tailY, 2.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      var newIter = Math.floor(t / (Math.PI * 2));
      if (newIter > iter) {
        iter = newIter;
        document.getElementById('iterLabel').textContent = 'ITERATION: ' + iter;
      }

      t += speed;
      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
